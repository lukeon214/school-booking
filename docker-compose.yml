version: "3.9"
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lukedbuser"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: m8gzX6aujuRa8AvNN6fa805SkhXb8drdCILfhL
      PORT: 3001
      RESEND_API_KEY: re_GRWCXSNZ_14ZYiwxog1sRXXQxbvZv1Kzt
      APP_URL: https://form.databooq.com
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    environment:
      VITE_API_URL: https://api.databooq.com
    depends_on:
      - backend
    networks:
      - app-net

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: luke@databooq.com
      PGADMIN_DEFAULT_PASSWORD: Undatra1!
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - app-net

volumes:
  pgdata:
  pgadmin-data:

networks:
  app-net: